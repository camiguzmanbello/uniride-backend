<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Emparejamientos</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 5px; text-align: left; }
        th { background-color: #f2f2f2; }
        h2 { text-align: center; }
    </style>
</head>
<body>
    <h2>Reporte de Emparejamientos Inteligentes</h2>
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Usuario</th>
                <th>Publicación</th>
                <th>Status</th>
                <th>Tiempo de Respuesta (s)</th>
            </tr>
        </thead>
        <tbody>
            {% for p in pairings %}
            <tr>
                <td>{{ p.created_at|date:"Y-m-d H:i" }}</td>
                <td>{{ p.user_id.name }}</td>
                <td>{{ p.publication_id.id }}</td>
                <td>{{ p.status_id.name }}</td>
                <td>{{ p.time_response|default:"-" }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
